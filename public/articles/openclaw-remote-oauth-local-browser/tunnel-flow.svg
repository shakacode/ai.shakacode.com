<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="380" viewBox="0 0 1120 380" role="img" aria-labelledby="title desc">
  <title id="title">SSH tunnel port forwarding flow</title>
  <desc id="desc">Diagram showing how SSH local port forwarding carries OAuth callback traffic from the Mac through to the VPS.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef8f2" />
    </linearGradient>
    <linearGradient id="vps-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="mac-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff" />
      <stop offset="100%" stop-color="#ede9fe" />
    </linearGradient>
    <linearGradient id="browser-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="ok-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" />
      <stop offset="100%" stop-color="#dcfce7" />
    </linearGradient>
    <linearGradient id="tunnel-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <marker id="arrow-purple" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7c3aed" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#16a34a" />
    </marker>
    <style><![CDATA[
      .card { stroke: #cbd5e1; stroke-width: 1.5; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .meta { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .code { font: 600 13px "SF Mono", SFMono-Regular, Menlo, monospace; fill: #7c3aed; }
      .line-tunnel { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrow-purple); stroke-dasharray: 10 6; }
      .line-ok { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .flow-pill { fill: rgba(255,255,255,0.96); stroke: #c4b5fd; stroke-width: 1.25; }
      .flow-text { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6d28d9; }
      .tunnel-bar { fill: url(#tunnel-grad); opacity: 0.12; }
    ]]></style>
  </defs>

  <rect width="1120" height="380" rx="28" fill="url(#bg)" />
  <circle cx="560" cy="190" r="200" fill="#ede9fe" opacity="0.2" />

  <!-- Tunnel visualization bar -->
  <rect class="tunnel-bar" x="240" y="120" width="640" height="140" rx="20" />

  <!-- VPS card (left) -->
  <rect class="card" x="60" y="100" width="240" height="180" rx="24" fill="url(#vps-fill)" filter="url(#shadow)" />
  <text class="title" x="90" y="146">VPS</text>
  <text class="body" x="90" y="178">OpenClaw listening on</text>
  <text class="code" x="90" y="200">127.0.0.1:1455</text>
  <text class="meta" x="90" y="232">Waiting for OAuth callback</text>
  <text class="meta" x="90" y="252">to arrive at this port</text>

  <!-- Mac card (center) -->
  <rect class="card" x="400" y="100" width="240" height="180" rx="24" fill="url(#mac-fill)" filter="url(#shadow)" />
  <text class="title" x="430" y="146">Your Mac</text>
  <text class="body" x="430" y="178">Port 1455 forwarded</text>
  <text class="code" x="430" y="200">ssh -L 1455:...</text>
  <text class="meta" x="430" y="232">Mac pretends port 1455</text>
  <text class="meta" x="430" y="252">is local &#x2014; SSH carries it</text>

  <!-- Browser card (right) -->
  <rect class="card" x="740" y="100" width="240" height="180" rx="24" fill="url(#browser-fill)" filter="url(#shadow)" />
  <text class="title" x="770" y="146">Local browser</text>
  <text class="body" x="770" y="178">Redirects to</text>
  <text class="code" x="770" y="200">127.0.0.1:1455/callback</text>
  <text class="meta" x="770" y="232">Browser thinks it's talking</text>
  <text class="meta" x="770" y="252">to localhost &#x2014; and it is!</text>

  <!-- Arrows -->
  <path class="line-tunnel" d="M 300 190 C 340 190, 370 190, 400 190" />
  <rect class="flow-pill" x="310" y="148" width="106" height="30" rx="15" />
  <text class="flow-text" x="328" y="168">SSH tunnel</text>

  <path class="line-ok" d="M 740 190 C 700 190, 670 190, 640 190" />
  <rect class="flow-pill" x="660" y="148" width="102" height="30" rx="15" style="stroke: #86efac;" />
  <text class="flow-text" x="678" y="168" style="fill: #16a34a;">Callback</text>

  <!-- Result row -->
  <rect class="card" x="300" y="310" width="520" height="50" rx="20" fill="url(#ok-fill)" style="stroke: #86efac;" />
  <text style="font: 700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #16a34a;" x="330" y="341">Traffic flows through SSH tunnel &#x2192; token reaches VPS &#x2713;</text>
</svg>
