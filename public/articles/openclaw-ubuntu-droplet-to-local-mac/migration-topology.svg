<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw migration topology</title>
  <desc id="desc">Diagram showing an Ubuntu source droplet bridged through a main Mac into an agent-box Mac with separate admin and agents users.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .accent { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 16; ry: 16; }
      .agent { fill: #ecfccb; stroke: #3f6212; stroke-width: 2; rx: 16; ry: 16; }
      .label { font: 600 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .arrow { stroke: #0f172a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="960" height="320"/>

  <rect class="box" x="36" y="90" width="220" height="140"/>
  <text class="label" x="66" y="132">Ubuntu source</text>
  <text class="small" x="66" y="164">Live OpenClaw runtime</text>
  <text class="small" x="66" y="190">/root/.openclaw</text>
  <text class="small" x="66" y="216">Slack, WhatsApp, cron</text>

  <rect class="accent" x="368" y="68" width="220" height="184"/>
  <text class="label" x="402" y="110">Main Mac</text>
  <text class="small" x="402" y="142">SSH trust to both sides</text>
  <text class="small" x="402" y="168">Backup staging</text>
  <text class="small" x="402" y="194">Bridge transfer scripts</text>
  <text class="small" x="402" y="220">Screen Sharing + review</text>

  <rect class="box" x="700" y="42" width="220" height="96"/>
  <text class="label" x="730" y="84">Agent box admin</text>
  <text class="small" x="730" y="114">Homebrew, SSH, system setup</text>

  <rect class="agent" x="700" y="182" width="220" height="96"/>
  <text class="label" x="730" y="224">Agent box agents</text>
  <text class="small" x="730" y="254">/Users/&lt;agents-user&gt;/.openclaw</text>

  <path class="arrow" d="M 256 160 L 368 160"/>
  <path class="arrow" d="M 588 120 L 700 90"/>
  <path class="arrow" d="M 588 200 L 700 230"/>

  <text class="small" x="280" y="148">backup + bridge</text>
  <text class="small" x="616" y="108">bootstrap</text>
  <text class="small" x="618" y="215">state copy</text>
</svg>
